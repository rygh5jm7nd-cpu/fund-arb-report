name: test-data
on: [workflow_dispatch]
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -q akshare pandas requests
      - name: probe eastmoney
        run: |
          python - <<'PY'
          import akshare as ak, requests, time
          t=time.time()
          print("ETF行情:", ak.fund_etf_spot_em().shape)
          print("交易日历:", len(ak.tool_trade_date_hist_sina()))
          u="https://push2delay.eastmoney.com/api/qt/clist/get"
          for fs,label in [("b:MK0404,b:MK0405,b:MK0406,b:MK0407","LOF"),("b:MK0354","可转债"),("b:MK0356","逆回购")]:
              d=requests.get(u,params={"pn":1,"pz":5,"fid":"f3","fs":fs,"fields":"f12,f14","ut":"bd1d9ddb04089700cf9c27f6f7426281"},timeout=25).json()["data"]
              print(label,"total=",d.get("total"))
          print("总耗时 %.1fs"%(time.time()-t))
          PY
